<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASHYAP ID STUDIO - Exact Gap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root {
            --gradient: linear-gradient(135deg, #FF9933 0%, #FFD700 50%, #2980b9 100%);
            /* Aapki image ke anusar gap ko badhakar 90mm kar diya hai */
            --gap-between: 90mm; 
        }

        body {
            background: var(--gradient);
            background-attachment: fixed;
            margin: 0; padding: 20px 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- UI Controls --- */
        .controls {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 15px;
            text-align: center; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%; max-width: 600px;
        }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-pdf { background: #e74c3c; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-rotate { background: #f39c12; color: white; }

        /* --- A4 Page (Image ke anusar) --- */
        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Cards ko vertical center mein rakhne ke liye */
            box-sizing: border-box;
            position: relative;
        }

        .card-box {
            width: 85.5mm;
            height: 54mm;
            border: 1px dashed #999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fafafa;
            position: relative;
            cursor: pointer;
        }

        /* Image ke anusar cards ke beech ka bada gap */
        #box1 { margin-bottom: var(--gap-between); } 

        .card-box img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .show-outline { border: 1px solid #000 !important; background: white; }
        .hint-text { color: #888; font-size: 11px; font-weight: bold; text-align: center; line-height: 1.4; }

        /* Modal Settings */
        #selectorModal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 10px; border-radius: 8px; max-width: 85%; max-height: 70vh; }

        @media print {
            .controls, #selectorModal, .hint-text { display: none !important; }
            body { background: white; padding: 0; }
            .a4-page { box-shadow: none; margin: 0; border: none; width: 210mm; height: 297mm; }
            .card-box { border: none; }
            .show-outline { border: 1px solid #000 !important; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:0; color:#333;">🪪 KASHYAP ID STUDIO</h2>
        <div class="btn-group">
            <button class="btn btn-pdf" onclick="document.getElementById('pdfInput').click()">📁 UPLOAD PDF</button>
            <button class="btn btn-green" onclick="window.print()">🖨️ PRINT CARD</button>
            <button class="btn btn-rotate" onclick="location.reload()">🔄 RESET</button>
        </div>
        <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
        <input type="file" id="directImgInput" accept="image/*" style="display:none">
    </div>

    <div class="a4-page">
        <div class="card-box" id="box1" onclick="handleBoxClick(1)">
            <span class="hint-text" id="hint1">📷 CLICK FOR IMAGE<br>OR UPLOAD PDF ABOVE</span>
            <img id="img1">
        </div>

        <div class="card-box" id="box2" onclick="handleBoxClick(2)">
            <span class="hint-text" id="hint2">📷 CLICK FOR IMAGE<br>OR UPLOAD PDF ABOVE</span>
            <img id="img2">
        </div>
    </div>

    <div id="selectorModal">
        <div style="color:white; margin-bottom:15px; font-size:18px;">Crop & Rotate Image</div>
        <div class="modal-content">
            <img id="cropPreview" style="max-width: 100%;">
        </div>
        <div class="btn-group">
            <button class="btn btn-rotate" onclick="cropper.rotate(90)">Rotate ↻</button>
            <button class="btn btn-green" id="cropBtn">SET IMAGE ✅</button>
            <button class="btn btn-pdf" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let cropper;
        let activeBoxId = 1;
        let isPdfMode = false;
        let currentPdfStep = 1;

        function handleBoxClick(num) {
            isPdfMode = false;
            activeBoxId = num;
            document.getElementById('directImgInput').click();
        }

        document.getElementById('directImgInput').onchange = function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => openCropModal(ev.target.result);
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('pdfInput').onchange = async function(e) {
            const file = e.target.files[0];
            if(!file) return;
            isPdfMode = true; currentPdfStep = 1;
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.5 });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                openCropModal(canvas.toDataURL('image/png'));
            };
            reader.readAsArrayBuffer(file);
        };

        function openCropModal(src) {
            const previewImg = document.getElementById('cropPreview');
            previewImg.src = src;
            document.getElementById('selectorModal').style.display = 'flex';
            if (cropper) cropper.destroy();
            cropper = new Cropper(previewImg, { 
                aspectRatio: 85.5/54, 
                viewMode: 1,
                background: false
            });

            document.getElementById('cropBtn').onclick = function() {
                const croppedData = cropper.getCroppedCanvas({ width: 1000 }).toDataURL('image/png');
                if(isPdfMode) {
                    applyToBox(currentPdfStep, croppedData);
                    if(currentPdfStep === 1) {
                        currentPdfStep = 2;
                        alert("Front side set! Ab Back side ke liye Crop karein.");
                        cropper.reset();
                    } else { closeModal(); }
                } else {
                    applyToBox(activeBoxId, croppedData);
                    closeModal();
                }
            };
        }

        function closeModal() {
            document.getElementById('selectorModal').style.display = 'none';
        }

        function applyToBox(num, src) {
            const img = document.getElementById('img' + num);
            img.src = src;
            img.style.display = "block";
            document.getElementById('hint' + num).style.display = "none";
            document.getElementById('box' + num).classList.add('show-outline');
        }
    </script>
</body>
</html>
