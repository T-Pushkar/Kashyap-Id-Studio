<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate KASHYAP ID Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root {
            --gradient: linear-gradient(135deg, #FF9933 0%, #FFD700 50%, #2980b9 100%);
            --gap: 40mm;
        }

        body {
            background: var(--gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- UI Controls --- */
        .controls {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 600px;
        }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-pdf { background: #e74c3c; color: white; }
        .btn-img { background: #3498db; color: white; }
        .btn-reset { background: #95a5a6; color: white; }

        /* --- A4 Page --- */
        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: var(--gap) 0;
            box-sizing: border-box;
            position: relative;
        }

        .card-box {
            width: 85.5mm;
            height: 54mm;
            border: 1px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            background: #fafafa;
            position: relative;
        }

        .card-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .show-outline { border: 1.5px solid #000 !important; background: white; }

        .hint-text { color: #aaa; font-size: 12px; font-weight: bold; margin-top: 5px; }

        #printBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #27ae60;
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* --- Modal for PDF Cropping --- */
        #selectorModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal-content { background: white; padding: 10px; border-radius: 10px; max-width: 90%; max-height: 70vh; }
        .modal-header { color: white; margin-bottom: 10px; text-align: center; }

        @media print {
            .controls, #printBtn, #selectorModal, .hint-text { display: none !important; }
            body { background: white; padding: 0; }
            .a4-page { box-shadow: none; margin: 0; }
            .card-box { border: none; }
            .show-outline { border: 1px solid #000 !important; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:0; color: #2c3e50;">KASHYAP ID STUDIO</h2>
        <p style="margin: 5px 0; font-size: 14px; color: #7f8c8d;">Niche se option chunein:</p>
        
        <div class="btn-group">
            <button class="btn btn-pdf" onclick="document.getElementById('pdfInput').click()">📁 UPLOAD PDF</button>
            <button class="btn btn-reset" onclick="location.reload()">🔄 RESET ALL</button>
        </div>
        
        <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
        <input type="file" id="directImgInput" accept="image/*" style="display:none">
    </div>

    <div class="a4-page">
        <div class="card-box" id="box1" onclick="handleBoxClick(1)">
            <span class="hint-text" id="hint1">📷 CLICK FOR IMAGE<br>OR UPLOAD PDF ABOVE</span>
            <img id="img1">
        </div>

        <button id="printBtn" onclick="window.print()">🖨️ PRINT NOW</button>

        <div class="card-box" id="box2" onclick="handleBoxClick(2)">
            <span class="hint-text" id="hint2">📷 CLICK FOR IMAGE<br>OR UPLOAD PDF ABOVE</span>
            <img id="img2">
        </div>
    </div>

    <div id="selectorModal">
        <div class="modal-header">
            <h2 id="modalMainTitle">PDF Selection</h2>
            <p id="modalStepTitle" style="color: #FFD700;">STEP 1: SELECT FRONT SIDE</p>
        </div>
        <div class="modal-content">
            <img id="pdfPagePreview" style="max-width: 100%;">
        </div>
        <button class="btn" style="background: #2ecc71; color: white; margin-top: 15px;" id="cropBtn" onclick="handlePdfCrop()">CROP & NEXT</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let cropper;
        let currentStep = 1; 
        let pdfImageSrc = "";
        let activeBoxId = 1;

        // --- OPTION 1: Direct Image Upload Logic ---
        function handleBoxClick(boxNum) {
            activeBoxId = boxNum;
            document.getElementById('directImgInput').click();
        }

        document.getElementById('directImgInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    applyImageToBox(activeBoxId, event.target.result);
                };
                reader.readAsDataURL(file);
            }
        };

        // --- OPTION 2: PDF Logic ---
        document.getElementById('pdfInput').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                const page = await pdf.getPage(1);
                
                const viewport = page.getViewport({ scale: 2.5 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                pdfImageSrc = canvas.toDataURL('image/png');
                currentStep = 1;
                openPdfModal();
            };
            reader.readAsArrayBuffer(file);
        };

        function openPdfModal() {
            const previewImg = document.getElementById('pdfPagePreview');
            previewImg.src = pdfImageSrc;
            document.getElementById('selectorModal').style.display = 'flex';
            updateModalUI();

            if (cropper) cropper.destroy();
            cropper = new Cropper(previewImg, {
                aspectRatio: 85.5 / 54,
                viewMode: 1,
                autoCropArea: 0.5
            });
        }

        function updateModalUI() {
            const stepTitle = document.getElementById('modalStepTitle');
            const cropBtn = document.getElementById('cropBtn');
            if (currentStep === 1) {
                stepTitle.innerText = "STEP 1: SELECT FRONT SIDE";
                cropBtn.innerText = "CROP FRONT & NEXT";
            } else {
                stepTitle.innerText = "STEP 2: SELECT BACK SIDE";
                cropBtn.innerText = "CROP BACK & FINISH";
            }
        }

        function handlePdfCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 855, height: 540 });
            applyImageToBox(currentStep, canvas.toDataURL('image/png'));

            if (currentStep === 1) {
                currentStep = 2;
                updateModalUI();
                cropper.reset(); 
            } else {
                document.getElementById('selectorModal').style.display = 'none';
                cropper.destroy();
            }
        }

        // --- COMMON: Apply Image to A4 ---
        function applyImageToBox(boxNum, src) {
            const img = document.getElementById('img' + boxNum);
            const box = document.getElementById('box' + boxNum);
            const hint = document.getElementById('hint' + boxNum);
            
            img.src = src;
            img.style.display = "block";
            hint.style.display = "none";
            box.classList.add('show-outline');
            
            document.getElementById('printBtn').style.display = "block";
        }
    </script>
</body>
</html>
